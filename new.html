<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Designer</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #fdf6e3;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    nav .logo {
      font-size: 24px;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li {
      position: relative;
    }

    nav ul li a {
      text-decoration: none;
      color: #333;
      font-size: 16px;
    }

    nav ul li .hire-me {
      background-color: #f6c138;
      padding: 10px 15px;
      border-radius: 5px;
      color: white;
      font-weight: bold;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 50px 40px;
    }

    .hero .content {
      max-width: 50%;
    }

    .hero h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero h2 span {
      color: #f6c138;
    }

    .contact-btn {
      background-color: #f6c138;
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .reviews {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .reviews span {
      color: #f6c138;
      font-size: 20px;
    }

    .image-container {
      position: relative;
    }

    .image-container img {
      border-radius: 50%;
      background-color: #f6c138;
      padding: 20px;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">RIMBERIO</div>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#contact" class="hire-me">Hire Me!</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="content">
        <h1>Hi, I'm Pedro Fernandes</h1>
        <h2><span>Product</span> Designer</h2>
        <button class="contact-btn">Contact me</button>
        <div class="reviews">
          <span>★★★★★</span>
          <p>125+ client reviews</p>
        </div>
      </div>
      <div class="image-container">
        <img src="profile-image.png" alt="Pedro Fernandes">
      </div>
    </section>
  </main>
</body>
</html>
